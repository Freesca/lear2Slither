[flake8]
# "norminette_python" = plain flake8 defaults; this section only tells it
# what to scan. `filename` adds the extensionless launchers; the ./ prefix is
# required because flake8 fnmatches the walked path (./snake), not basenames.
filename = *.py,./snake,./hub
extend-exclude = .venv

[tool:pytest]
testpaths = tests
